<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Palestra">
<meta name="theme-color" content="#0c0c0c">
<title>Palestra</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&display=swap');
:root{
  --bg:#0c0c0c;--card:#181818;--border:#2a2a2a;
  --inp:#222;--inp-b:#333;
  --safe-t:env(safe-area-inset-top,44px);
  --safe-b:env(safe-area-inset-bottom,20px);
  --ac:#e85d04;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:#fff;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;height:100%;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh;max-width:393px;margin:0 auto;overflow:hidden}

/* HEADER */
#hdr{padding:calc(var(--safe-t) + 10px) 18px 12px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:12px;z-index:10}
#back{background:#222;border:none;color:#fff;width:36px;height:36px;border-radius:10px;font-size:24px;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;line-height:1}
#eyebrow{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:1px;color:var(--ac)}
#htitle{font-size:28px;font-weight:900;letter-spacing:-0.5px;color:#fff;text-transform:uppercase;line-height:1}

/* SCREENS */
.scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px 0;display:none;flex-direction:column}
.scr.on{display:flex}

/* BOTTOM NAV */
#bnav{display:flex;background:#111;border-top:1px solid var(--border);flex-shrink:0;padding-bottom:var(--safe-b)}
.nb{flex:1;background:none;border:none;color:#555;font-family:inherit;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:10px 0 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.nb.on{color:var(--ac)}
.nb svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

/* COMMON */
.slbl{font-size:11px;color:#777;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.bspace{height:calc(var(--safe-b) + 10px);flex-shrink:0}
.empty{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;color:#444;font-size:14px;font-weight:700;text-transform:uppercase;line-height:1.8}

/* HOME */
.dw{position:relative;margin-bottom:10px}
.dbtn{width:100%;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px 52px 16px 18px;cursor:pointer;text-align:left;display:block;position:relative;overflow:hidden;font-family:inherit}
.dbtn.lit{border-color:var(--ac)}
.dtbar{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--ac),transparent);display:none}
.dbtn.lit .dtbar{display:block}
.dtag{display:inline-block;font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--ac);background:color-mix(in srgb,var(--ac) 15%,transparent);border-radius:6px;padding:2px 8px;margin-bottom:5px}
.dname{font-size:24px;font-weight:900;color:#fff;text-transform:uppercase;line-height:1.1}
.dmeta{font-size:13px;color:#aaa;font-weight:700;margin-top:4px}
.dpw{margin-top:10px;height:3px;background:#222;border-radius:4px;overflow:hidden;display:none}
.dbtn.lit .dpw{display:block}
.dpb{height:100%;border-radius:4px}
.dedit{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:#222;border:none;color:#888;width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}

/* ═══ WORKOUT CARD ═══════════════════════════════════════════════════════════ */
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:10px;overflow:hidden}

/* Exercise header */
.ex-top{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 0}
.exname{font-size:19px;font-weight:900;text-transform:uppercase;color:#fff;line-height:1;flex:1}
.note-btn{background:none;border:none;cursor:pointer;font-size:18px;padding:0 0 0 8px;line-height:1;flex-shrink:0}

/* PT note */
.pt-note{font-size:12px;color:#666;font-weight:600;line-height:1.4;font-style:italic;padding:5px 14px 0}

/* Session note textarea */
.note-wrap{display:none;padding:8px 14px 0}
.note-wrap.open{display:block}
textarea.note-ta{width:100%;background:#141414;border:1.5px solid #2a2a2a;border-radius:9px;color:#ccc;font-family:inherit;font-size:14px;font-weight:600;padding:9px 11px;resize:none;outline:none;min-height:64px;line-height:1.5}
textarea.note-ta:focus{border-color:var(--ac)!important}
textarea.note-ta::placeholder{color:#3a3a3a}

/* ── LAST WEEK BLOCK ── */
.lw-block{margin:10px 14px 0;background:#111;border:1px solid #222;border-left:3px solid var(--ac);border-radius:9px;padding:8px 10px}
.lw-label{font-size:10px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--ac);margin-bottom:6px;opacity:.8}
.lw-series{display:flex;flex-direction:column;gap:4px}
.lw-row{display:grid;grid-template-columns:22px 1fr 1fr;gap:6px;align-items:center}
.lw-num{font-size:11px;font-weight:900;text-align:center;color:var(--ac);opacity:.7}
.lw-val{font-size:14px;font-weight:800;color:#888}
.lw-val span{color:#bbb}
.lw-empty{font-size:12px;color:#444;font-weight:700;font-style:italic}

/* ── DIVIDER ── */
.ex-divider{height:1px;background:var(--border);margin:10px 14px 0}

/* ── THIS WEEK INPUTS ── */
.tw-section{padding:8px 14px 14px}
.tw-label{font-size:10px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:8px}
.shdr{display:grid;grid-template-columns:22px 1fr 1fr 28px;gap:8px;margin-bottom:5px}
.sclbl{font-size:10px;color:#555;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.srow{display:grid;grid-template-columns:22px 1fr 1fr 28px;gap:8px;align-items:center;margin-bottom:6px}
.snum{font-size:12px;font-weight:900;text-align:center;border-radius:6px;padding:7px 0;display:block;background:color-mix(in srgb,var(--ac) 15%,transparent);color:var(--ac)}
.sdiff{display:flex;gap:4px;margin-bottom:6px;padding-left:30px;margin-top:-3px}
input[type=number],input[type=text]{background:var(--inp);border:1.5px solid var(--inp-b);border-radius:9px;color:#fff;font-weight:800;font-family:inherit;width:100%;padding:7px 9px;-webkit-appearance:none;outline:none;font-size:22px}
input:focus{border-color:var(--ac)!important}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.rmsbtn{background:none;border:none;color:#f87171;font-size:16px;cursor:pointer;padding:0;line-height:1;text-align:center}
.rmsbtn:disabled{color:#2a2a2a;cursor:default}

.bdg{font-size:10px;font-weight:800;border-radius:5px;padding:2px 6px}
.bdg.up{color:#4ade80;background:rgba(74,222,128,.13)}
.bdg.dn{color:#f87171;background:rgba(248,113,113,.13)}
.bdg.eq{color:#9ca3af;background:rgba(156,163,175,.13)}

.addserie{width:100%;background:var(--inp);border:1px dashed color-mix(in srgb,var(--ac) 40%,transparent);border-radius:9px;color:var(--ac);font-size:13px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:9px 0;cursor:pointer;margin-top:2px;font-family:inherit}

.savebtn{display:block;width:calc(100% - 28px);margin:10px 14px;color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:900;letter-spacing:1.5px;padding:17px 0;text-transform:uppercase;cursor:pointer;font-family:inherit;flex-shrink:0;background:var(--ac)}

/* EDIT */
.erow{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.mbtn{background:none;border:none;font-size:14px;cursor:pointer;padding:2px 6px;color:#888;font-family:inherit}
.mbtn:disabled{color:#333;cursor:default}
.ename{flex:1;font-size:16px;font-weight:800;text-transform:uppercase;color:#fff}
.rmbtn{background:#2a1010;border:none;color:#f87171;border-radius:7px;padding:5px 11px;font-size:12px;font-weight:800;text-transform:uppercase;cursor:pointer;font-family:inherit}
.addbox{border-radius:13px;padding:13px;margin-bottom:12px;background:var(--card)}
.addbox input{font-size:16px;margin-bottom:10px}
.addconf{width:100%;color:#fff;border:none;border-radius:9px;padding:12px 0;font-size:15px;font-weight:900;text-transform:uppercase;cursor:pointer;font-family:inherit;background:var(--ac)}
.saveschema{width:100%;background:#fff;color:#0c0c0c;border:none;border-radius:13px;padding:16px 0;font-size:16px;font-weight:900;text-transform:uppercase;cursor:pointer;font-family:inherit;margin-bottom:16px}

/* HISTORY */
.week-card{background:var(--card);border:1px solid var(--border);border-radius:15px;padding:13px 15px;margin-bottom:10px;position:relative;cursor:default}
.week-date{font-size:17px;font-weight:900;color:#fff;text-transform:uppercase}
.week-sub{font-size:12px;color:#888;font-weight:700;margin-top:2px}
.week-arrow{color:#555;font-size:20px}
.wday-card{background:var(--card);border:1px solid var(--border);border-radius:15px;padding:13px;margin-bottom:10px}
.wday-title{font-size:17px;font-weight:900;text-transform:uppercase;margin-bottom:11px}
.hist-ex-card{margin-bottom:8px;padding:9px 0;border-bottom:1px solid var(--border)}
.hist-ex-name{font-size:15px;font-weight:900;text-transform:uppercase;color:#fff;margin-bottom:5px}
.hist-serie-row{display:flex;gap:8px;align-items:center;margin-bottom:3px}
.hist-snum{font-size:11px;font-weight:900;width:18px;text-align:center}
.hist-val{font-size:13px;font-weight:800;color:#ddd}
.hist-note{font-size:12px;color:#777;font-style:italic;margin-top:5px;padding:7px 9px;background:#111;border-radius:7px;line-height:1.5}


/* ═══ TIMER ══════════════════════════════════════════════════════════════════ */
#timer-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);
  width:100%;max-width:393px;
  background:#111;border-top:1px solid #2a2a2a;
  padding:12px 16px calc(var(--safe-b) + 12px);
  z-index:500;transition:transform .3s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;gap:10px;
}
#timer-bar.open{transform:translateX(-50%) translateY(0)}
.timer-presets{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.tp{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:8px;color:#aaa;
  font-family:inherit;font-size:12px;font-weight:800;letter-spacing:.5px;
  padding:8px 0;cursor:pointer;text-align:center;transition:background .15s,color .15s}
.tp:active,.tp.sel{background:var(--ac);border-color:var(--ac);color:#fff}
.timer-display{display:flex;align-items:center;justify-content:space-between;gap:10px}
#timer-countdown{
  font-size:48px;font-weight:900;letter-spacing:-1px;color:#fff;line-height:1;
  font-variant-numeric:tabular-nums;min-width:110px;
}
#timer-countdown.done{color:#4ade80}
#timer-countdown.urgent{color:#f87171}
.timer-btns{display:flex;gap:8px;flex:1;justify-content:flex-end}
.tbtn{border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:900;
  letter-spacing:.5px;padding:10px 16px;cursor:pointer;text-transform:uppercase}
#tbtn-start{background:var(--ac);color:#fff}
#tbtn-reset{background:#222;color:#888}
#tbtn-close{background:#1a1a1a;color:#555;padding:10px 12px}
.timer-ring-wrap{position:relative;width:56px;height:56px;flex-shrink:0}
.timer-ring-wrap svg{width:56px;height:56px;transform:rotate(-90deg)}
#ring-bg{fill:none;stroke:#222;stroke-width:4}
#ring-fg{fill:none;stroke:var(--ac);stroke-width:4;stroke-linecap:round;
  stroke-dasharray:157;stroke-dashoffset:0;transition:stroke-dashoffset .9s linear,stroke .3s}

/* TOAST */
#toast{position:fixed;top:calc(var(--safe-t) + 58px);left:50%;transform:translateX(-50%) translateY(-10px);color:#fff;padding:10px 26px;border-radius:100px;font-size:14px;font-weight:800;letter-spacing:.5px;z-index:999;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s,transform .15s;box-shadow:0 8px 32px rgba(0,0,0,.6);background:var(--ac)}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes si{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
.si{animation:si .2s ease forwards}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <button id="back" onclick="goBack()">&#8249;</button>
    <div><div id="eyebrow"></div><div id="htitle"></div></div>
  </div>
  <div id="s-home"     class="scr on"><div id="home-c"></div><div class="bspace"></div></div>
  <div id="s-workout"  class="scr"><div id="workout-c"></div><div style="display:flex;gap:8px;padding:10px 14px 0"><button class="savebtn" id="savebtn" onclick="saveWorkout()" style="margin:0;flex:1">💾 Salva</button><button onclick="openTimer()" style="background:#181818;border:1px solid #2a2a2a;color:#fff;border-radius:14px;font-size:22px;width:56px;height:56px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center">⏱</button></div><div class="bspace"></div></div>
  <div id="s-edit"     class="scr"><div id="edit-c"></div><div class="bspace"></div></div>
  <div id="s-history"  class="scr"><div id="hist-c"></div><div class="bspace"></div></div>
  <div id="s-histweek" class="scr"><div id="histweek-c"></div><div class="bspace"></div></div>
  <div id="bnav">
    <button class="nb on" id="nb-home" onclick="navTab('home')">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home
    </button>
    <button class="nb" id="nb-history" onclick="navTab('history')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Storico
    </button>
  </div>
</div>
<div id="timer-bar">
  <div class="timer-presets">
    <button class="tp" onclick="setTimer(60)">1'</button>
    <button class="tp" onclick="setTimer(75)">1'15"</button>
    <button class="tp" onclick="setTimer(80)">1'20"</button>
    <button class="tp" onclick="setTimer(90)">1'30"</button>
    <button class="tp" onclick="setTimer(120)">2'</button>
  </div>
  <div class="timer-display">
    <div class="timer-ring-wrap">
      <svg viewBox="0 0 56 56"><circle id="ring-bg" cx="28" cy="28" r="25"/><circle id="ring-fg" cx="28" cy="28" r="25"/></svg>
    </div>
    <div id="timer-countdown">0:00</div>
    <div class="timer-btns">
      <button class="tbtn" id="tbtn-reset" onclick="resetTimer()">Reset</button>
      <button class="tbtn" id="tbtn-start" onclick="toggleTimer()">Start</button>
      <button class="tbtn" id="tbtn-close" onclick="closeTimer()">✕</button>
    </div>
  </div>
</div>
<div id="toast"></div>
<script>
// ═══ SCHEDA ══════════════════════════════════════════════════════════════════
const DAYS_DEFAULT=[
  {id:'A',label:'Petto · Spalle · Gambe',color:'#e85d04',exercises:[
    {name:'Panca Piana',note:'4x8-6-6-4 — 75/80/85% RM, rec 2\''},
    {name:'Military Press (AMRAP 8\')',note:'6 reps + 8 piegamenti a ciclo, rec max 1\'30" — segna i giri'},
    {name:'Panca 45°',note:'3x8 buffer 2/3, discesa in 3"'},
    {name:'Lento Avanti',note:'3x10 rec 1\'15"'},
    {name:'Squat con Manubri',note:'4x8 rec 1\'30"'},
    {name:'Bulgarian Split Squat',note:'3x10 rec 1\'20"'},
    {name:'Dead Bug / Barchetta',note:'5x20" rec 1\''},
  ]},
  {id:'B',label:'Squat · Stacchi · Core',color:'#10b981',exercises:[
    {name:'Squat',note:'5x7 fermo 2" in buca, non oltre il parallelo'},
    {name:'Stacchi',note:'3x8 buffer 2, rec 1\'30"/2\''},
    {name:'Affondi Overhead Bilanciere',note:'3x10 rec 1\'30" — peso leggero, focus addome'},
    {name:'Leg Curl + Leg Extension (superset)',note:'3x12+12 rec 1\''},
    {name:'Crunch Inverso + Plank (superset)',note:'8/10 reps + 30" — retroversione di bacino sempre'},
  ]},
  {id:'C',label:'Schiena · Stacchi',color:'#3b82f6',exercises:[
    {name:'Lat Machine',note:'4x8 rec 1\'30"'},
    {name:'Australian Pull Up + Rematore Plank (AMRAP 10\')',note:'8/10 pull up + 4/6 rematori, rec 1\'30" — segna i giri'},
    {name:'Rematore Bilanciere + Gorilla Row (superset)',note:'8 reps buffer 2/3 + 10 reps kettlebell'},
    {name:'Pull Down Manubrio in Hollow Hold + Plank',note:'20" hollow hold + 30" plank'},
    {name:'Stacchi da Terra',note:'3x8/10 rec 1\'30"/2\''},
    {name:'Affondi Overhead Bilanciere',note:'3x10 rec 1\'30"'},
    {name:'Calf Raises',note:'3x15/20 rec 50"'},
  ]},
  {id:'D',label:'Stacchi · Spalle · Schiena',color:'#a855f7',exercises:[
    {name:'Stacchi da Terra',note:'5x8-6-6-4 rec 2\' — buffer 3, ultima buffer 2/0'},
    {name:'Squat',note:'3x10 fermo 2" in buca, rec 1\'30"'},
    {name:'Bulgarian Split Squat',note:'3x12 rec 1\''},
    {name:'Military Press + Triceps Push Up (superset)',note:'x4: 8 reps + 6/8 reps, rec 1\'30"'},
    {name:'Pulley Largo al Petto',note:'3x10 fermo 2" in contrazione, rec 1\'30"'},
    {name:'Rematore Manubrio su Panca',note:'3x10 rec 1\'20"'},
  ]},
];

// ═══ STORAGE ═════════════════════════════════════════════════════════════════
function lsGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch(e){return null}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true}catch(e){return false}}
function lsKeys(){try{return Object.keys(localStorage)}catch(e){return[]}}

// ═══ DATE ════════════════════════════════════════════════════════════════════
function weekKey(off){const n=new Date(),dow=n.getDay()||7,m=new Date(n);m.setDate(n.getDate()-dow+1-(off||0)*7);return m.toISOString().slice(0,10)}
function fmtD(d){if(!d)return'';const[y,mo,dy]=d.split('-');return dy+'/'+mo+'/'+y}
function fmtS(d){if(!d)return'';const[,mo,dy]=d.split('-');return dy+'/'+mo}
const THIS_KEY=weekKey(0),LAST_KEY=weekKey(1),LOG_PFX='gym_log_',DAYS_KEY='gym_days_v4';

// ═══ STATE ═══════════════════════════════════════════════════════════════════
const S={days:JSON.parse(JSON.stringify(DAYS_DEFAULT)),thisWeek:{},lastWeek:{},screen:'home',tab:'home',activeDayId:null,openNotes:{}};
function loadState(){
  const d=lsGet(DAYS_KEY),tw=lsGet(LOG_PFX+THIS_KEY),lw=lsGet(LOG_PFX+LAST_KEY);
  if(d)S.days=d;if(tw)S.thisWeek=tw;if(lw)S.lastWeek=lw;
}

// ═══ SAVE ════════════════════════════════════════════════════════════════════
function save(){const ok=lsSet(LOG_PFX+THIS_KEY,S.thisWeek);if(!ok)showToast('⚠️ Errore salvataggio');return ok}

// ═══ TOAST ═══════════════════════════════════════════════════════════════════
let tT;
function showToast(msg,color){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.background=color||activeDay()?.color||'#e85d04';
  el.classList.add('on');clearTimeout(tT);tT=setTimeout(()=>el.classList.remove('on'),2500);
}

// ═══ HELPERS ═════════════════════════════════════════════════════════════════
function activeDay(){return S.days.find(d=>d.id===S.activeDayId)||null}
function xn(e){return typeof e==='string'?e:e.name}
function xo(e){return typeof e==='string'?'':e.note||''}
function getSeries(ex){return S.thisWeek[S.activeDayId]?.[ex]?.series||[{peso:'',reps:''}]}
function getLastSeries(ex){return S.lastWeek[S.activeDayId]?.[ex]?.series||[]}
function getNote(ex){return S.thisWeek[S.activeDayId]?.[ex]?.sessionNote||''}
function dif(a,b){const n=parseFloat(a),o=parseFloat(b);if(isNaN(n)||isNaN(o))return null;return Math.round((n-o)*10)/10}
function bdg(val,unit){if(val===null)return'';const c=val>0?'up':val<0?'dn':'eq',s=val>0?'+':'';return'<span class="bdg '+c+'">'+s+val+unit+'</span>'}
function esc(s){return(''+s).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
function setAc(c){document.documentElement.style.setProperty('--ac',c||'#e85d04')}
function ensureSeries(ex){
  const d=S.activeDayId;
  if(!S.thisWeek[d])S.thisWeek[d]={};
  if(!S.thisWeek[d][ex])S.thisWeek[d][ex]={};
  if(!S.thisWeek[d][ex].series)S.thisWeek[d][ex].series=[{peso:'',reps:''}];
}

// ═══ NAVIGATION ══════════════════════════════════════════════════════════════
function showScr(id){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  const el=document.getElementById('s-'+id);
  el.classList.add('on','si');setTimeout(()=>el.classList.remove('si'),300);
  S.screen=id;
}
function setHdr(eyebrow,title,showBack,color){
  document.getElementById('eyebrow').textContent=eyebrow;
  document.getElementById('htitle').textContent=title;
  document.getElementById('eyebrow').style.color=color||'#e85d04';
  document.getElementById('back').style.display=showBack?'flex':'none';
  setAc(color);
}
function navTab(tab){
  S.tab=tab;S.activeDayId=null;S.openNotes={};
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('nb-'+tab).classList.add('on');
  setAc('#e85d04');
  if(tab==='home'){setHdr('Sett. '+fmtS(THIS_KEY),'',false);renderHome();showScr('home')}
  else if(tab==='history'){setHdr('Tutti gli allenamenti','Storico',false);renderHistory();showScr('history')}
}
function goBack(){
  if(S.screen==='workout'||S.screen==='edit'){S.activeDayId=null;S.openNotes={};navTab('home')}
  else if(S.screen==='histweek'){setHdr('Tutti gli allenamenti','Storico',false);renderHistory();showScr('history')}
}
function openDay(id){
  S.activeDayId=id;S.openNotes={};
  const day=activeDay();setAc(day.color);
  setHdr('Giorno '+day.id,'Allenamento',true,day.color);
  document.getElementById('savebtn').style.background=day.color;
  renderWorkout();showScr('workout');
}
function openEdit(id){
  S.activeDayId=id;const day=activeDay();setAc(day.color);
  setHdr('Giorno '+day.id,'Modifica scheda',true,day.color);
  renderEdit();showScr('edit');
}
function openHistWeek(wkey){
  setHdr('Sett. '+fmtS(wkey),fmtD(wkey),true,'#e85d04');
  renderHistWeek(wkey);showScr('histweek');
}

// ═══ RENDER HOME ═════════════════════════════════════════════════════════════
function renderHome(){
  let h='<div class="slbl">Settimana del '+fmtS(THIS_KEY)+'</div>';
  S.days.forEach(day=>{
    const names=day.exercises.map(xn);
    const done=names.filter(n=>(S.thisWeek[day.id]?.[n]?.series||[]).some(s=>s.peso||s.reps)).length;
    const tot=names.length,pct=tot>0?Math.round(done/tot*100):0,lit=done>0;
    h+='<div class="dw">'+
      '<button class="dbtn'+(lit?' lit':'')+'" style="--ac:'+day.color+'" onclick="openDay(\''+day.id+'\')">'+
        '<div class="dtbar"></div>'+
        '<div class="dtag">Giorno '+day.id+'</div>'+
        '<div class="dname">'+day.label+'</div>'+
        '<div class="dmeta">'+(tot===0?'Nessun esercizio':tot+' esercizi')+(lit?' <span style="color:'+day.color+';margin-left:8px">'+done+'/'+tot+' completati</span>':'')+'</div>'+
        '<div class="dpw"><div class="dpb" style="width:'+pct+'%;background:'+day.color+'"></div></div>'+
      '</button>'+
      '<button class="dedit" onclick="openEdit(\''+day.id+'\')">✏️</button>'+
    '</div>';
  });
  document.getElementById('home-c').innerHTML=h;
}

// ═══ RENDER WORKOUT ══════════════════════════════════════════════════════════
function renderWorkout(){
  const day=activeDay(),el=document.getElementById('workout-c');
  if(!day.exercises||!day.exercises.length){
    el.innerHTML='<div class="empty">Nessun esercizio.<br><span style="color:#555">Usa ✏️ per aggiungerne</span></div>';
    return;
  }
  let h='';
  day.exercises.forEach(exObj=>{
    const name=xn(exObj),ptNote=xo(exObj);
    const series=getSeries(name),lastSeries=getLastSeries(name);
    const sessionNote=getNote(name);
    const noteOpen=S.openNotes[name]||false;
    const hasNote=sessionNote.length>0;
    const eid=name.replace(/[^a-zA-Z0-9]/g,'_');

    // ── Last week block ──
    let lwHtml='';
    if(lastSeries.length>0&&lastSeries.some(s=>s.peso||s.reps)){
      let lwRows='';
      lastSeries.forEach((s,i)=>{
        if(!s.peso&&!s.reps)return;
        lwRows+='<div class="lw-row">'+
          '<span class="lw-num">'+(i+1)+'</span>'+
          '<span class="lw-val"><span>'+(s.peso||'—')+'</span> kg</span>'+
          '<span class="lw-val"><span>'+(s.reps||'—')+'</span> rep</span>'+
        '</div>';
      });
      lwHtml='<div class="lw-block" style="border-left-color:'+day.color+'">'+
        '<div class="lw-label">Settimana scorsa</div>'+
        '<div class="lw-series">'+lwRows+'</div>'+
      '</div>';
    }

    // ── This week inputs ──
    let inputRows='';
    series.forEach((s,i)=>{
      const lw=lastSeries[i]||null;
      const dp=lw?dif(s.peso,lw.peso):null,dr=lw?dif(s.reps,lw.reps):null;
      const hasDiff=(dp!==null||dr!==null)&&(s.peso||s.reps);
      inputRows+='<div class="srow">'+
        '<span class="snum">'+(i+1)+'</span>'+
        '<input type="number" inputmode="decimal" value="'+s.peso+'" placeholder="'+(lw?.peso||'0')+'" oninput="upSerie(\''+esc(name)+'\','+i+',\'peso\',this.value)">'+
        '<input type="number" inputmode="numeric" value="'+s.reps+'" placeholder="'+(lw?.reps||'0')+'" oninput="upSerie(\''+esc(name)+'\','+i+',\'reps\',this.value)">'+
        '<button class="rmsbtn" onclick="rmSerie(\''+esc(name)+'\','+i+')" '+(series.length===1?'disabled':'')+'>✕</button>'+
      '</div>'+
      (hasDiff?'<div class="sdiff">'+bdg(dp,'kg')+bdg(dr,'r')+'</div>':'');
    });

    h+='<div class="ex-card">'+
      // header
      '<div class="ex-top">'+
        '<div class="exname">'+name+'</div>'+
        '<button class="note-btn" onclick="toggleNote(\''+esc(name)+'\')" title="Note sessione">'+(hasNote?'📝':'📋')+'</button>'+
      '</div>'+
      // PT note
      (ptNote?'<div class="pt-note">'+ptNote+'</div>':'')+
      // session note
      '<div class="note-wrap'+(noteOpen?' open':'')+'" id="nw-'+eid+'">'+
        '<textarea class="note-ta" id="nt-'+eid+'" placeholder="Note sessione..." oninput="upNote(\''+esc(name)+'\',this.value)">'+sessionNote+'</textarea>'+
      '</div>'+
      // last week reference block
      lwHtml+
      // divider
      '<div class="ex-divider"></div>'+
      // this week inputs
      '<div class="tw-section">'+
        '<div class="tw-label">Questa settimana</div>'+
        '<div class="shdr">'+
          '<span class="sclbl" style="text-align:center">#</span>'+
          '<span class="sclbl">Peso kg</span>'+
          '<span class="sclbl">Reps</span>'+
          '<span></span>'+
        '</div>'+
        inputRows+
        '<button class="addserie" onclick="addSerie(\''+esc(name)+'\')">+ Serie</button>'+
      '</div>'+
    '</div>';
  });
  el.innerHTML=h;
}

// ═══ RENDER EDIT ═════════════════════════════════════════════════════════════
function renderEdit(){
  const day=activeDay(),el=document.getElementById('edit-c');
  let h='<div class="slbl">Esercizi — Giorno '+day.id+'</div>';
  if(!day.exercises||!day.exercises.length)
    h+='<div style="text-align:center;padding:24px 0;color:#555;font-size:14px;font-weight:700;text-transform:uppercase">Nessun esercizio</div>';
  day.exercises.forEach((exObj,i)=>{
    const name=xn(exObj);
    h+='<div class="erow">'+
      '<div style="display:flex;flex-direction:column;gap:2px">'+
        '<button class="mbtn" onclick="mvEx('+i+',-1)" '+(i===0?'disabled':'')+'>▲</button>'+
        '<button class="mbtn" onclick="mvEx('+i+',1)" '+(i===day.exercises.length-1?'disabled':'')+'>▼</button>'+
      '</div>'+
      '<span class="ename">'+name+'</span>'+
      '<button class="rmbtn" onclick="rmEx(\''+esc(name)+'\')">Rimuovi</button>'+
    '</div>';
  });
  h+='<div class="addbox" style="border:1.5px dashed color-mix(in srgb,'+day.color+' 50%,transparent)">'+
    '<input type="text" id="nex" placeholder="Nuovo esercizio..." onkeydown="if(event.key===\'Enter\')addEx()">'+
    '<button class="addconf" onclick="addEx()">+ Aggiungi</button>'+
  '</div>'+
  '<button class="saveschema" onclick="saveSchema()">Salva scheda</button>'+
  '<div class="bspace"></div>';
  el.innerHTML=h;
}

// ═══ RENDER HISTORY ══════════════════════════════════════════════════════════
function renderHistory(){
  const el=document.getElementById('hist-c');
  const keys=lsKeys().filter(k=>k.startsWith(LOG_PFX)).map(k=>k.replace(LOG_PFX,'')).filter(k=>/^\d{4}-\d{2}-\d{2}$/.test(k)).sort((a,b)=>b.localeCompare(a));
  if(!keys.length){el.innerHTML='<div class="empty">Nessun allenamento salvato.<br><span style="color:#555">Inizia ad allenarti!</span></div>';return}
  let h='<div class="slbl">Settimane salvate</div>';
  keys.forEach(wkey=>{
    const log=lsGet(LOG_PFX+wkey)||{};
    const daysLogged=S.days.filter(day=>{
      const dl=log[day.id];if(!dl)return false;
      return Object.values(dl).some(ex=>(ex.series||[]).some(s=>s.peso||s.reps));
    });
    const isCur=wkey===THIS_KEY;
    h+='<div class="week-card">'+
      '<div onclick="openHistWeek(\''+wkey+'\')" style="cursor:pointer;padding-right:46px">'+
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px">'+
          '<div>'+
            '<div class="week-date">Sett. del '+fmtS(wkey)+'</div>'+
            '<div class="week-sub">'+fmtD(wkey)+(isCur?' · <span style="color:#e85d04">questa settimana</span>':'')+'</div>'+
          '</div>'+
          '<span style="color:#555;font-size:18px;margin-top:2px">›</span>'+
        '</div>'+
        '<div style="display:flex;gap:5px;flex-wrap:wrap">'+
          (daysLogged.length?daysLogged.map(d=>'<span style="font-size:11px;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:'+d.color+';background:'+d.color+'22;border-radius:5px;padding:2px 7px">Giorno '+d.id+'</span>').join(''):'<span style="font-size:12px;color:#555">Nessun dato</span>')+
        '</div>'+
      '</div>'+
      '<button onclick="deleteWeek(\''+wkey+'\')" style="position:absolute;top:50%;right:12px;transform:translateY(-50%);background:#2a1010;border:none;color:#f87171;border-radius:9px;width:36px;height:36px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center">🗑</button>'+
    '</div>';
  });
  el.innerHTML=h;
  renderSettings();
}

// ═══ DELETE WEEK ═════════════════════════════════════════════════════════════
function renderSettings(){
  const settingsHtml='<div style="margin-top:20px;padding-top:16px;border-top:1px solid #222">'+
    '<div class="slbl">Impostazioni</div>'+
    '<button onclick="hardRefresh()" style="width:100%;background:#181818;border:1px solid #2a2a2a;color:#aaa;border-radius:13px;padding:14px 16px;font-family:inherit;font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;gap:10px;margin-bottom:8px">'+
      '<span style="font-size:20px">🔄</span>'+
      '<div style="text-align:left"><div style="color:#fff">Aggiorna app</div><div style="font-size:11px;color:#555;font-weight:700;margin-top:2px">Svuota cache e ricarica la versione più recente</div></div>'+
    '</button>'+
    '<button onclick="clearAllData()" style="width:100%;background:#1a0a0a;border:1px solid #3a1010;color:#f87171;border-radius:13px;padding:14px 16px;font-family:inherit;font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;gap:10px">'+
      '<span style="font-size:20px">🗑</span>'+
      '<div style="text-align:left"><div>Cancella tutti i dati</div><div style="font-size:11px;color:#a55;font-weight:700;margin-top:2px">Elimina tutti gli allenamenti salvati</div></div>'+
    '</button>'+
  '</div>';
  document.getElementById('hist-c').insertAdjacentHTML('beforeend', settingsHtml);
}

function hardRefresh(){
  if(!confirm('Svuotare la cache e ricaricare l\'app?'))return;
  // clear caches via Cache API if available
  if('caches' in window){
    caches.keys().then(names=>names.forEach(n=>caches.delete(n)));
  }
  // force reload bypassing cache
  window.location.reload(true);
}

function clearAllData(){
  if(!confirm('Eliminare TUTTI gli allenamenti salvati? Questa azione non è reversibile.'))return;
  try{
    const keys=lsKeys().filter(k=>k.startsWith(LOG_PFX));
    keys.forEach(k=>localStorage.removeItem(k));
    S.thisWeek={};S.lastWeek={};
    showToast('Dati eliminati','#555');
    renderHistory();
  }catch(e){showToast('Errore','#f87171')}
}

function deleteWeek(wkey){
  if(!confirm('Eliminare l\'allenamento del '+fmtD(wkey)+'?'))return;
  try{localStorage.removeItem(LOG_PFX+wkey)}catch(e){}
  if(wkey===THIS_KEY){S.thisWeek={};lsSet(LOG_PFX+THIS_KEY,{})}
  if(wkey===LAST_KEY)S.lastWeek={};
  showToast('Eliminato','#555');
  renderHistory();
}

// ═══ RENDER HISTORY WEEK ═════════════════════════════════════════════════════
function renderHistWeek(wkey){
  const log=lsGet(LOG_PFX+wkey)||{},el=document.getElementById('histweek-c');
  let h='<div class="slbl">'+fmtD(wkey)+'</div>',any=false;
  S.days.forEach(day=>{
    const dl=log[day.id];if(!dl)return;
    const exNames=Object.keys(dl).filter(ex=>(dl[ex].series||[]).some(s=>s.peso||s.reps));
    if(!exNames.length)return;
    any=true;
    h+='<div class="wday-card">'+
      '<div class="wday-title" style="color:'+day.color+'">Giorno '+day.id+' — '+day.label+'</div>';
    exNames.forEach(exName=>{
      const series=dl[exName].series||[],sNote=dl[exName].sessionNote||'';
      h+='<div class="hist-ex-card"><div class="hist-ex-name">'+exName+'</div>';
      series.forEach((s,i)=>{
        if(!s.peso&&!s.reps)return;
        h+='<div class="hist-serie-row">'+
          '<span class="hist-snum" style="color:'+day.color+'">'+(i+1)+'</span>'+
          '<span class="hist-val">'+(s.peso?s.peso+' kg':'—')+'</span>'+
          '<span class="hist-val" style="color:#444">×</span>'+
          '<span class="hist-val">'+(s.reps?s.reps+' rep':'—')+'</span>'+
        '</div>';
      });
      if(sNote)h+='<div class="hist-note">📝 '+sNote+'</div>';
      h+='</div>';
    });
    h+='</div>';
  });
  if(!any)h+='<div class="empty">Nessun dato per questa settimana</div>';
  el.innerHTML=h;
}

// ═══ WORKOUT ACTIONS ═════════════════════════════════════════════════════════
function upSerie(ex,idx,field,val){
  ensureSeries(ex);
  S.thisWeek[S.activeDayId][ex].series[idx][field]=val;
  save();
}
function addSerie(ex){
  ensureSeries(ex);
  S.thisWeek[S.activeDayId][ex].series.push({peso:'',reps:''});
  save();renderWorkout();
}
function rmSerie(ex,idx){
  const s=S.thisWeek[S.activeDayId]?.[ex]?.series;
  if(!s||s.length<=1)return;
  s.splice(idx,1);save();renderWorkout();
}
function saveWorkout(){const ok=save();showToast(ok?'✓ Salvato!':'⚠️ Errore nel salvataggio')}

// ═══ NOTE ACTIONS ════════════════════════════════════════════════════════════
function toggleNote(ex){
  S.openNotes[ex]=!S.openNotes[ex];
  const eid=ex.replace(/[^a-zA-Z0-9]/g,'_');
  const wrap=document.getElementById('nw-'+eid);
  if(wrap){
    wrap.classList.toggle('open',S.openNotes[ex]);
    if(S.openNotes[ex])document.getElementById('nt-'+eid)?.focus();
  }
}
function upNote(ex,val){
  const d=S.activeDayId;
  if(!S.thisWeek[d])S.thisWeek[d]={};
  if(!S.thisWeek[d][ex])S.thisWeek[d][ex]={};
  S.thisWeek[d][ex].sessionNote=val;
  save();
  const btn=document.querySelector('.note-btn[onclick="toggleNote(\''+ex.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\')"]');
  if(btn){btn.textContent=val.length>0?'📝':'📋'}
}

// ═══ EDIT ACTIONS ════════════════════════════════════════════════════════════
function addEx(){
  const inp=document.getElementById('nex'),name=inp.value.trim(),day=activeDay();
  if(!name||day.exercises.some(e=>xn(e)===name))return;
  day.exercises.push({name,note:''});inp.value='';renderEdit();
}
function rmEx(name){const day=activeDay();day.exercises=day.exercises.filter(e=>xn(e)!==name);renderEdit()}
function mvEx(i,dir){
  const day=activeDay(),j=i+dir;
  if(j<0||j>=day.exercises.length)return;
  [day.exercises[i],day.exercises[j]]=[day.exercises[j],day.exercises[i]];renderEdit();
}
function saveSchema(){lsSet(DAYS_KEY,S.days);showToast('✓ Scheda salvata');navTab('home')}

// ═══ AUTOSAVE ════════════════════════════════════════════════════════════════
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')save()});
window.addEventListener('pagehide',()=>save());
window.addEventListener('blur',()=>save());


// ═══ TIMER ═══════════════════════════════════════════════════════════════════
const T={secs:90,remaining:90,running:false,interval:null,total:90};

function openTimer(){
  document.getElementById('timer-bar').classList.add('open');
  updateTimerUI();
}
function closeTimer(){
  document.getElementById('timer-bar').classList.remove('open');
  pauseTimer();
}
function setTimer(secs){
  pauseTimer();
  T.secs=secs;T.remaining=secs;T.total=secs;
  document.querySelectorAll('.tp').forEach(b=>b.classList.remove('sel'));
  event.target.classList.add('sel');
  updateTimerUI();
}
function toggleTimer(){
  if(T.running)pauseTimer();
  else startTimer();
}
function startTimer(){
  if(T.remaining<=0){T.remaining=T.total}
  T.running=true;
  document.getElementById('tbtn-start').textContent='Pausa';
  T.interval=setInterval(()=>{
    T.remaining--;
    updateTimerUI();
    if(T.remaining<=0){
      clearInterval(T.interval);T.running=false;
      document.getElementById('tbtn-start').textContent='Start';
      timerDone();
    }
  },1000);
}
function pauseTimer(){
  clearInterval(T.interval);T.running=false;
  document.getElementById('tbtn-start').textContent='Start';
}
function resetTimer(){
  pauseTimer();T.remaining=T.total;updateTimerUI();
}
function timerDone(){
  // vibrate
  if(navigator.vibrate)navigator.vibrate([200,100,200,100,400]);
  // beep with Web Audio
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.3,0.6].forEach(t=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=880;g.gain.setValueAtTime(0.4,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.25);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+0.25);
    });
  }catch(e){}
  const cd=document.getElementById('timer-countdown');
  cd.classList.add('done');
  setTimeout(()=>cd.classList.remove('done'),3000);
}
function updateTimerUI(){
  const m=Math.floor(T.remaining/60),s=T.remaining%60;
  const cd=document.getElementById('timer-countdown');
  cd.textContent=m+':'+(s<10?'0':'')+s;
  cd.classList.toggle('urgent',T.remaining>0&&T.remaining<=10);
  cd.classList.toggle('done',T.remaining===0&&!T.running);
  // ring
  const pct=T.total>0?T.remaining/T.total:1;
  const offset=157*(1-pct);
  const ring=document.getElementById('ring-fg');
  ring.style.strokeDashoffset=offset;
  ring.style.stroke=T.remaining<=10&&T.remaining>0?'#f87171':T.remaining===0?'#4ade80':'var(--ac)';
}
