<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Palestra">
<meta name="theme-color" content="#0c0c0c">
<title>Palestra</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&display=swap');
:root{
  --bg:#0c0c0c;--card:#181818;--border:#2a2a2a;
  --inp:#222;--inp-b:#333;
  --safe-t:env(safe-area-inset-top,44px);
  --safe-b:env(safe-area-inset-bottom,20px);
  --ac:#e85d04;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:#fff;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;height:100%;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;overflow:hidden}

/* HEADER */
#hdr{padding:calc(var(--safe-t) + 12px) 20px 14px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:12px;z-index:10}
#back{background:#222;border:none;color:#fff;width:38px;height:38px;border-radius:10px;font-size:24px;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;line-height:1}
#eyebrow{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:2px;color:var(--ac)}
#htitle{font-size:30px;font-weight:900;letter-spacing:-0.5px;color:#fff;text-transform:uppercase;line-height:1}

/* SCREENS */
.scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 0;display:none;flex-direction:column}
.scr.on{display:flex}

/* BOTTOM NAV */
#bnav{display:flex;background:#111;border-top:1px solid var(--border);flex-shrink:0;padding-bottom:var(--safe-b)}
.nb{flex:1;background:none;border:none;color:#555;font-family:inherit;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:10px 0 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.nb.on{color:var(--ac)}
.nb svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

/* COMMON */
.slbl{font-size:12px;color:#888;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px 14px 14px;margin-bottom:12px}
.bspace{height:calc(var(--safe-b) + 10px);flex-shrink:0}
.empty{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;color:#444;font-size:14px;font-weight:700;text-transform:uppercase;line-height:1.8}

/* HOME */
.dw{position:relative;margin-bottom:12px}
.dbtn{width:100%;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px 56px 18px 20px;cursor:pointer;text-align:left;display:block;position:relative;overflow:hidden;font-family:inherit}
.dbtn.lit{border-color:var(--ac)}
.dtbar{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--ac),transparent);display:none}
.dbtn.lit .dtbar{display:block}
.dtag{display:inline-block;font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--ac);background:color-mix(in srgb,var(--ac) 15%,transparent);border-radius:6px;padding:3px 8px;margin-bottom:6px}
.dname{font-size:26px;font-weight:900;color:#fff;text-transform:uppercase;line-height:1.1}
.dmeta{font-size:14px;color:#aaa;font-weight:700;margin-top:5px}
.dpw{margin-top:12px;height:4px;background:#222;border-radius:4px;overflow:hidden;display:none}
.dbtn.lit .dpw{display:block}
.dpb{height:100%;border-radius:4px}
.dedit{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:#222;border:none;color:#888;width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}

/* WORKOUT */
.ex-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.exname{font-size:20px;font-weight:900;text-transform:uppercase;color:#fff}
.note-btn{background:none;border:none;cursor:pointer;font-size:20px;padding:0;line-height:1;color:#555;transition:color .15s}
.note-btn.has{color:#facc15}
.exnote-pt{font-size:13px;color:#999;font-weight:600;line-height:1.5;margin-bottom:10px;font-style:italic}
.note-wrap{margin-top:8px;margin-bottom:4px;display:none}
.note-wrap.open{display:block}
textarea.note-ta{width:100%;background:#1c1c1c;border:1.5px solid #333;border-radius:10px;color:#e0e0e0;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;font-size:15px;font-weight:600;padding:10px 12px;resize:none;outline:none;min-height:72px;line-height:1.5}
textarea.note-ta:focus{border-color:var(--ac)!important}
textarea.note-ta::placeholder{color:#444}

.shdr{display:grid;grid-template-columns:28px 1fr 1fr 32px;gap:8px;margin-bottom:6px}
.sclbl{font-size:11px;color:#888;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.srow{margin-bottom:8px}
.sinp{display:grid;grid-template-columns:28px 1fr 1fr 32px;gap:8px;align-items:center}
.snum{font-size:13px;font-weight:900;text-align:center;border-radius:7px;padding:8px 0;display:block}
input[type=number],input[type=text]{background:var(--inp);border:1.5px solid var(--inp-b);border-radius:10px;color:#fff;font-weight:800;font-family:inherit;width:100%;padding:8px 10px;-webkit-appearance:none;outline:none;font-size:24px}
input:focus{border-color:var(--ac)!important}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.rmsbtn{background:none;border:none;color:#f87171;font-size:18px;cursor:pointer;padding:0;line-height:1;text-align:center}
.rmsbtn:disabled{color:#333;cursor:default}
.scmp{display:flex;gap:5px;padding-left:36px;margin-top:4px;align-items:center;flex-wrap:wrap}
.clbl{font-size:11px;color:#666;font-weight:700}
.cval{font-size:12px;color:#999;font-weight:700}
.bdg{font-size:11px;font-weight:800;border-radius:6px;padding:2px 7px}
.bdg.up{color:#4ade80;background:rgba(74,222,128,.13)}
.bdg.dn{color:#f87171;background:rgba(248,113,113,.13)}
.bdg.eq{color:#9ca3af;background:rgba(156,163,175,.13)}
.addserie{width:100%;background:var(--inp);border:1px dashed color-mix(in srgb,var(--ac) 50%,transparent);border-radius:10px;color:var(--ac);font-size:14px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:10px 0;cursor:pointer;margin-top:4px;font-family:inherit}
.savebtn{display:block;width:calc(100% - 28px);margin:14px 14px;color:#fff;border:none;border-radius:16px;font-size:18px;font-weight:900;letter-spacing:1.5px;padding:18px 0;text-transform:uppercase;cursor:pointer;font-family:inherit;flex-shrink:0;background:var(--ac)}

/* EDIT */
.erow{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.mbtn{background:none;border:none;font-size:14px;cursor:pointer;padding:2px 6px;color:#888;font-family:inherit}
.mbtn:disabled{color:#333;cursor:default}
.ename{flex:1;font-size:17px;font-weight:800;text-transform:uppercase;color:#fff}
.rmbtn{background:#2a1010;border:none;color:#f87171;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:800;text-transform:uppercase;cursor:pointer;font-family:inherit}
.addbox{border-radius:14px;padding:14px;margin-bottom:12px;background:var(--card)}
.addbox input{font-size:17px;margin-bottom:10px}
.addconf{width:100%;color:#fff;border:none;border-radius:10px;padding:13px 0;font-size:16px;font-weight:900;text-transform:uppercase;cursor:pointer;font-family:inherit;background:var(--ac)}
.saveschema{width:100%;background:#fff;color:#0c0c0c;border:none;border-radius:14px;padding:17px 0;font-size:17px;font-weight:900;text-transform:uppercase;cursor:pointer;font-family:inherit;margin-bottom:16px}

/* HISTORY */
.week-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 16px;margin-bottom:10px;cursor:pointer}
.week-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.week-date{font-size:18px;font-weight:900;color:#fff;text-transform:uppercase}
.week-sub{font-size:13px;color:#888;font-weight:700;margin-top:2px}
.week-arrow{color:#555;font-size:20px}
.wday-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px}
.wday-title{font-size:18px;font-weight:900;text-transform:uppercase;margin-bottom:12px}
.hist-ex-card{margin-bottom:8px;padding:10px 0;border-bottom:1px solid var(--border)}
.hist-ex-name{font-size:16px;font-weight:900;text-transform:uppercase;color:#fff;margin-bottom:6px}
.hist-serie-row{display:flex;gap:8px;align-items:center;margin-bottom:4px}
.hist-snum{font-size:12px;font-weight:900;width:20px;text-align:center}
.hist-val{font-size:14px;font-weight:800;color:#ddd}
.hist-note{font-size:13px;color:#888;font-style:italic;margin-top:6px;padding:8px 10px;background:#111;border-radius:8px;line-height:1.5}

/* TOAST */
#toast{position:fixed;top:calc(var(--safe-t) + 60px);left:50%;transform:translateX(-50%) translateY(-10px);color:#fff;padding:11px 28px;border-radius:100px;font-size:14px;font-weight:800;letter-spacing:.5px;z-index:999;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s,transform .15s;box-shadow:0 8px 32px rgba(0,0,0,.6);background:var(--ac)}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes si{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.si{animation:si .2s ease forwards}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <button id="back" onclick="goBack()">&#8249;</button>
    <div><div id="eyebrow"></div><div id="htitle"></div></div>
  </div>
  <div id="s-home"     class="scr on"><div id="home-c"></div><div class="bspace"></div></div>
  <div id="s-workout"  class="scr"><div id="workout-c"></div><button class="savebtn" id="savebtn" onclick="saveWorkout()">💾 Salva allenamento</button><div class="bspace"></div></div>
  <div id="s-edit"     class="scr"><div id="edit-c"></div><div class="bspace"></div></div>
  <div id="s-history"  class="scr"><div id="hist-c"></div><div class="bspace"></div></div>
  <div id="s-histweek" class="scr"><div id="histweek-c"></div><div class="bspace"></div></div>
  <div id="bnav">
    <button class="nb on" id="nb-home" onclick="navTab('home')">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home
    </button>
    <button class="nb" id="nb-history" onclick="navTab('history')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Storico
    </button>
  </div>
</div>
<div id="toast"></div>
<script>
// ── SCHEDA ───────────────────────────────────────────────────────────────────
const DAYS_DEFAULT=[
  {id:'A',label:'Petto · Spalle · Gambe',color:'#e85d04',exercises:[
    {name:'Panca Piana',note:'4x8-6-6-4 — 75/80/85% RM, rec 2\''},
    {name:'Military Press (AMRAP 8\')',note:'6 reps + 8 piegamenti a ciclo, rec max 1\'30" — segna i giri'},
    {name:'Panca 45°',note:'3x8 buffer 2/3, discesa in 3"'},
    {name:'Lento Avanti',note:'3x10 rec 1\'15"'},
    {name:'Squat con Manubri',note:'4x8 rec 1\'30"'},
    {name:'Bulgarian Split Squat',note:'3x10 rec 1\'20"'},
    {name:'Dead Bug / Barchetta',note:'5x20" rec 1\''},
  ]},
  {id:'B',label:'Squat · Stacchi · Core',color:'#10b981',exercises:[
    {name:'Squat',note:'5x7 fermo 2" in buca, non oltre il parallelo'},
    {name:'Stacchi',note:'3x8 buffer 2, rec 1\'30"/2\''},
    {name:'Affondi Overhead Bilanciere',note:'3x10 rec 1\'30" — peso leggero, focus addome'},
    {name:'Leg Curl + Leg Extension (superset)',note:'3x12+12 rec 1\''},
    {name:'Crunch Inverso + Plank (superset)',note:'8/10 reps + 30" — retroversione di bacino sempre'},
  ]},
  {id:'C',label:'Schiena · Stacchi',color:'#3b82f6',exercises:[
    {name:'Lat Machine',note:'4x8 rec 1\'30"'},
    {name:'Australian Pull Up + Rematore Plank (AMRAP 10\')',note:'8/10 pull up + 4/6 rematori, rec 1\'30" — segna i giri'},
    {name:'Rematore Bilanciere + Gorilla Row (superset)',note:'8 reps buffer 2/3 + 10 reps kettlebell'},
    {name:'Pull Down Manubrio in Hollow Hold + Plank',note:'20" hollow hold + 30" plank'},
    {name:'Stacchi da Terra',note:'3x8/10 rec 1\'30"/2\''},
    {name:'Affondi Overhead Bilanciere',note:'3x10 rec 1\'30"'},
    {name:'Calf Raises',note:'3x15/20 rec 50"'},
  ]},
  {id:'D',label:'Stacchi · Spalle · Schiena',color:'#a855f7',exercises:[
    {name:'Stacchi da Terra',note:'5x8-6-6-4 rec 2\' — buffer 3, ultima buffer 2/0'},
    {name:'Squat',note:'3x10 fermo 2" in buca, rec 1\'30"'},
    {name:'Bulgarian Split Squat',note:'3x12 rec 1\''},
    {name:'Military Press + Triceps Push Up (superset)',note:'x4: 8 reps + 6/8 reps, rec 1\'30"'},
    {name:'Pulley Largo al Petto',note:'3x10 fermo 2" in contrazione, rec 1\'30"'},
    {name:'Rematore Manubrio su Panca',note:'3x10 rec 1\'20"'},
  ]},
];

// ── STORAGE ──────────────────────────────────────────────────────────────────
function lsGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch(e){return null}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true}catch(e){return false}}
function lsKeys(){try{return Object.keys(localStorage)}catch(e){return[]}}

// ── DATE ─────────────────────────────────────────────────────────────────────
function weekKey(off){const n=new Date(),dow=n.getDay()||7,m=new Date(n);m.setDate(n.getDate()-dow+1-(off||0)*7);return m.toISOString().slice(0,10)}
function fmtD(d){if(!d)return'';const[y,mo,dy]=d.split('-');return dy+'/'+mo+'/'+y}
function fmtS(d){if(!d)return'';const[,mo,dy]=d.split('-');return dy+'/'+mo}
const THIS_KEY=weekKey(0),LAST_KEY=weekKey(1),LOG_PFX='gym_log_',DAYS_KEY='gym_days_v4';

// ── STATE ─────────────────────────────────────────────────────────────────────
const S={days:JSON.parse(JSON.stringify(DAYS_DEFAULT)),thisWeek:{},lastWeek:{},screen:'home',tab:'home',activeDayId:null,openNotes:{}};
function loadState(){
  const d=lsGet(DAYS_KEY),tw=lsGet(LOG_PFX+THIS_KEY),lw=lsGet(LOG_PFX+LAST_KEY);
  if(d)S.days=d;if(tw)S.thisWeek=tw;if(lw)S.lastWeek=lw;
}

// ── SAVE ─────────────────────────────────────────────────────────────────────
function save(){const ok=lsSet(LOG_PFX+THIS_KEY,S.thisWeek);if(!ok)showToast('⚠️ Errore salvataggio');return ok}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let tT;
function showToast(msg,color){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.background=color||activeDay()?.color||'#e85d04';
  el.classList.add('on');clearTimeout(tT);tT=setTimeout(()=>el.classList.remove('on'),2500);
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function activeDay(){return S.days.find(d=>d.id===S.activeDayId)||null}
function xn(e){return typeof e==='string'?e:e.name}
function xo(e){return typeof e==='string'?'':e.note||''}
function getSeries(ex){return S.thisWeek[S.activeDayId]?.[ex]?.series||[{peso:'',reps:''}]}
function getLastSeries(ex){return S.lastWeek[S.activeDayId]?.[ex]?.series||[]}
function getNote(ex){return S.thisWeek[S.activeDayId]?.[ex]?.sessionNote||''}
function dif(a,b){const n=parseFloat(a),o=parseFloat(b);if(isNaN(n)||isNaN(o))return null;return Math.round((n-o)*10)/10}
function bdg(val,unit){if(val===null)return'';const c=val>0?'up':val<0?'dn':'eq',s=val>0?'+':'';return'<span class="bdg '+c+'">'+s+val+unit+'</span>'}
function esc(s){return(''+s).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
function setAc(c){document.documentElement.style.setProperty('--ac',c||'#e85d04')}
function ensureSeries(ex){
  const d=S.activeDayId;
  if(!S.thisWeek[d])S.thisWeek[d]={};
  if(!S.thisWeek[d][ex])S.thisWeek[d][ex]={};
  if(!S.thisWeek[d][ex].series)S.thisWeek[d][ex].series=[{peso:'',reps:''}];
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function showScr(id){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  const el=document.getElementById('s-'+id);
  el.classList.add('on','si');setTimeout(()=>el.classList.remove('si'),300);
  S.screen=id;
}
function setHdr(eyebrow,title,showBack,color){
  document.getElementById('eyebrow').textContent=eyebrow;
  document.getElementById('htitle').textContent=title;
  document.getElementById('eyebrow').style.color=color||'#e85d04';
  document.getElementById('back').style.display=showBack?'flex':'none';
  setAc(color);
}
function navTab(tab){
  S.tab=tab;S.activeDayId=null;S.openNotes={};
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('nb-'+tab).classList.add('on');
  setAc('#e85d04');
  if(tab==='home'){setHdr('Sett. '+fmtS(THIS_KEY),'Buona palestra 💪',false);renderHome();showScr('home')}
  else if(tab==='history'){setHdr('Tutti gli allenamenti','Storico',false);renderHistory();showScr('history')}
}
function goBack(){
  if(S.screen==='workout'||S.screen==='edit'){S.activeDayId=null;S.openNotes={};navTab('home')}
  else if(S.screen==='histweek'){setHdr('Tutti gli allenamenti','Storico',false);renderHistory();showScr('history')}
}
function openDay(id){
  S.activeDayId=id;S.openNotes={};
  const day=activeDay();setAc(day.color);
  setHdr('Giorno '+day.id,'Allenamento',true,day.color);
  document.getElementById('savebtn').style.background=day.color;
  renderWorkout();showScr('workout');
}
function openEdit(id){
  S.activeDayId=id;const day=activeDay();setAc(day.color);
  setHdr('Giorno '+day.id,'Modifica scheda',true,day.color);
  renderEdit();showScr('edit');
}
function openHistWeek(wkey){
  setHdr('Sett. '+fmtS(wkey),fmtD(wkey),true,'#e85d04');
  renderHistWeek(wkey);showScr('histweek');
}

// ── RENDER HOME ───────────────────────────────────────────────────────────────
function renderHome(){
  let h='<div class="slbl">Settimana del '+fmtS(THIS_KEY)+'</div>';
  S.days.forEach(day=>{
    const names=day.exercises.map(xn);
    const done=names.filter(n=>(S.thisWeek[day.id]?.[n]?.series||[]).some(s=>s.peso||s.reps)).length;
    const tot=names.length,pct=tot>0?Math.round(done/tot*100):0,lit=done>0;
    h+='<div class="dw">'+
      '<button class="dbtn'+(lit?' lit':'')+'" style="--ac:'+day.color+'" onclick="openDay(\''+day.id+'\')">'+
        '<div class="dtbar"></div>'+
        '<div class="dtag">Giorno '+day.id+'</div>'+
        '<div class="dname">'+day.label+'</div>'+
        '<div class="dmeta">'+(tot===0?'Nessun esercizio':tot+' esercizi')+(lit?' <span style="color:'+day.color+';margin-left:8px">'+done+'/'+tot+' completati</span>':'')+'</div>'+
        '<div class="dpw"><div class="dpb" style="width:'+pct+'%;background:'+day.color+'"></div></div>'+
      '</button>'+
      '<button class="dedit" onclick="openEdit(\''+day.id+'\')">✏️</button>'+
    '</div>';
  });
  document.getElementById('home-c').innerHTML=h;
}

// ── RENDER WORKOUT ────────────────────────────────────────────────────────────
function renderWorkout(){
  const day=activeDay(),el=document.getElementById('workout-c');
  if(!day.exercises||!day.exercises.length){el.innerHTML='<div class="empty">Nessun esercizio.<br><span style="color:#555">Usa ✏️ per aggiungerne</span></div>';return}
  let h='';
  day.exercises.forEach(exObj=>{
    const name=xn(exObj),note=xo(exObj);
    const series=getSeries(name),last=getLastSeries(name);
    const sessionNote=getNote(name);
    const noteOpen=S.openNotes[name]||false;
    const hasNote=sessionNote.length>0;
    const eid=name.replace(/[^a-zA-Z0-9]/g,'_');

    let rows='';
    series.forEach((s,i)=>{
      const lw=last[i]||null;
      const dp=lw?dif(s.peso,lw.peso):null,dr=lw?dif(s.reps,lw.reps):null;
      const cmp=(lw&&(lw.peso||lw.reps))?
        '<div class="scmp"><span class="clbl">scorsa:</span>'+
        (lw.peso?'<span class="cval">'+lw.peso+'kg</span>':'')+
        (lw.reps?'<span class="cval">'+lw.reps+'rep</span>':'')+
        bdg(dp,'kg')+bdg(dr,'r')+'</div>':'';
      rows+='<div class="srow">'+
        '<div class="sinp">'+
          '<span class="snum" style="color:'+day.color+';background:'+day.color+'22">'+(i+1)+'</span>'+
          '<input type="number" inputmode="decimal" value="'+s.peso+'" placeholder="'+(lw?.peso||'0')+'" oninput="upSerie(\''+esc(name)+'\','+i+',\'peso\',this.value)">'+
          '<input type="number" inputmode="numeric" value="'+s.reps+'" placeholder="'+(lw?.reps||'0')+'" oninput="upSerie(\''+esc(name)+'\','+i+',\'reps\',this.value)">'+
          '<button class="rmsbtn" onclick="rmSerie(\''+esc(name)+'\','+i+')" '+(series.length===1?'disabled':'')+'>✕</button>'+
        '</div>'+cmp+
      '</div>';
    });

    h+='<div class="card">'+
      '<div class="ex-hdr">'+
        '<div class="exname">'+name+'</div>'+
        '<button class="note-btn'+(hasNote?' has':'')+'" onclick="toggleNote(\''+esc(name)+'\')" title="Note sessione">'+
          (hasNote?'📝':'📋')+
        '</button>'+
      '</div>'+
      (note?'<div class="exnote-pt">'+note+'</div>':'')+
      '<div class="note-wrap'+(noteOpen?' open':'')+'" id="nw-'+eid+'">'+
        '<textarea class="note-ta" id="nt-'+eid+'" placeholder="Scrivi note per questa sessione..." oninput="upNote(\''+esc(name)+'\',this.value)">'+sessionNote+'</textarea>'+
      '</div>'+
      '<div class="shdr"><span class="sclbl" style="text-align:center">#</span><span class="sclbl">Peso kg</span><span class="sclbl">Reps</span><span></span></div>'+
      rows+
      '<button class="addserie" onclick="addSerie(\''+esc(name)+'\')">+ Serie</button>'+
    '</div>';
  });
  el.innerHTML=h;
}

// ── RENDER EDIT ───────────────────────────────────────────────────────────────
function renderEdit(){
  const day=activeDay(),el=document.getElementById('edit-c');
  let h='<div class="slbl">Esercizi — Giorno '+day.id+'</div>';
  if(!day.exercises||!day.exercises.length)
    h+='<div style="text-align:center;padding:24px 0;color:#555;font-size:14px;font-weight:700;text-transform:uppercase">Nessun esercizio</div>';
  day.exercises.forEach((exObj,i)=>{
    const name=xn(exObj);
    h+='<div class="erow">'+
      '<div style="display:flex;flex-direction:column;gap:2px">'+
        '<button class="mbtn" onclick="mvEx('+i+',-1)" '+(i===0?'disabled':'')+'>▲</button>'+
        '<button class="mbtn" onclick="mvEx('+i+',1)" '+(i===day.exercises.length-1?'disabled':'')+'>▼</button>'+
      '</div>'+
      '<span class="ename">'+name+'</span>'+
      '<button class="rmbtn" onclick="rmEx(\''+esc(name)+'\')">Rimuovi</button>'+
    '</div>';
  });
  h+='<div class="addbox" style="border:1.5px dashed color-mix(in srgb,'+day.color+' 50%,transparent)">'+
    '<input type="text" id="nex" placeholder="Nuovo esercizio..." onkeydown="if(event.key===\'Enter\')addEx()">'+
    '<button class="addconf" onclick="addEx()">+ Aggiungi</button>'+
  '</div>'+
  '<button class="saveschema" onclick="saveSchema()">Salva scheda</button>'+
  '<div class="bspace"></div>';
  el.innerHTML=h;
}

// ── RENDER HISTORY ────────────────────────────────────────────────────────────
function renderHistory(){
  const el=document.getElementById('hist-c');
  const keys=lsKeys().filter(k=>k.startsWith(LOG_PFX)).map(k=>k.replace(LOG_PFX,'')).filter(k=>/^\d{4}-\d{2}-\d{2}$/.test(k)).sort((a,b)=>b.localeCompare(a));
  if(!keys.length){el.innerHTML='<div class="empty">Nessun allenamento salvato.<br><span style="color:#555">Inizia ad allenarti!</span></div>';return}
  let h='<div class="slbl">Settimane salvate</div>';
  keys.forEach(wkey=>{
    const log=lsGet(LOG_PFX+wkey)||{};
    const daysLogged=S.days.filter(day=>{
      const dl=log[day.id];if(!dl)return false;
      return Object.values(dl).some(ex=>(ex.series||[]).some(s=>s.peso||s.reps));
    });
    const isCur=wkey===THIS_KEY;
    h+='<div class="week-card" style="position:relative;cursor:default">'+
      '<div onclick="openHistWeek(\''+wkey+'\')" style="cursor:pointer;padding-right:50px">'+
        '<div class="week-hdr">'+
          '<div>'+
            '<div class="week-date">Sett. del '+fmtS(wkey)+'</div>'+
            '<div class="week-sub">'+fmtD(wkey)+(isCur?' · <span style="color:#e85d04">questa settimana</span>':'')+'</div>'+
          '</div>'+
          '<span class="week-arrow">›</span>'+
        '</div>'+
        '<div style="display:flex;gap:6px;flex-wrap:wrap">'+
          (daysLogged.length?daysLogged.map(d=>'<span style="font-size:11px;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:'+d.color+';background:'+d.color+'22;border-radius:5px;padding:2px 7px">Giorno '+d.id+'</span>').join(''):'<span style="font-size:12px;color:#555">Nessun dato</span>')+
        '</div>'+
      '</div>'+
      '<button onclick="deleteWeek(\''+wkey+'')" style="position:absolute;top:50%;right:12px;transform:translateY(-50%);background:#2a1010;border:none;color:#f87171;border-radius:10px;width:38px;height:38px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">🗑</button>'+
    '</div>';
  });
  el.innerHTML=h;
}

// ── DELETE WEEK ───────────────────────────────────────────────────────────────
function deleteWeek(wkey){
  if(!confirm('Eliminare l\'allenamento del '+fmtD(wkey)+'?'))return;
  try{localStorage.removeItem(LOG_PFX+wkey)}catch(e){}
  if(wkey===THIS_KEY){S.thisWeek={};lsSet(LOG_PFX+THIS_KEY,{})}
  if(wkey===LAST_KEY)S.lastWeek={};
  showToast('Eliminato','#555');
  renderHistory();
}


// ── RENDER HISTORY WEEK ───────────────────────────────────────────────────────
function renderHistWeek(wkey){
  const log=lsGet(LOG_PFX+wkey)||{},el=document.getElementById('histweek-c');
  let h='<div class="slbl">'+fmtD(wkey)+'</div>',any=false;
  S.days.forEach(day=>{
    const dl=log[day.id];if(!dl)return;
    const exNames=Object.keys(dl).filter(ex=>(dl[ex].series||[]).some(s=>s.peso||s.reps));
    if(!exNames.length)return;
    any=true;
    h+='<div class="wday-card">'+
      '<div class="wday-title" style="color:'+day.color+'">Giorno '+day.id+' — '+day.label+'</div>';
    exNames.forEach(exName=>{
      const series=dl[exName].series||[];
      const sNote=dl[exName].sessionNote||'';
      h+='<div class="hist-ex-card">'+
        '<div class="hist-ex-name">'+exName+'</div>';
      series.forEach((s,i)=>{
        if(!s.peso&&!s.reps)return;
        h+='<div class="hist-serie-row">'+
          '<span class="hist-snum" style="color:'+day.color+'">'+(i+1)+'</span>'+
          '<span class="hist-val">'+(s.peso?s.peso+' kg':'—')+'</span>'+
          '<span class="hist-val" style="color:#555">×</span>'+
          '<span class="hist-val">'+(s.reps?s.reps+' rep':'—')+'</span>'+
        '</div>';
      });
      if(sNote)h+='<div class="hist-note">📝 '+sNote+'</div>';
      h+='</div>';
    });
    h+='</div>';
  });
  if(!any)h+='<div class="empty">Nessun dato per questa settimana</div>';
  el.innerHTML=h;
}

// ── AZIONI WORKOUT ────────────────────────────────────────────────────────────
function upSerie(ex,idx,field,val){
  ensureSeries(ex);
  S.thisWeek[S.activeDayId][ex].series[idx][field]=val;
  save();
}
function addSerie(ex){
  ensureSeries(ex);
  S.thisWeek[S.activeDayId][ex].series.push({peso:'',reps:''});
  save();renderWorkout();
}
function rmSerie(ex,idx){
  const s=S.thisWeek[S.activeDayId]?.[ex]?.series;
  if(!s||s.length<=1)return;
  s.splice(idx,1);save();renderWorkout();
}
function saveWorkout(){const ok=save();showToast(ok?'✓ Salvato!':'⚠️ Errore nel salvataggio')}

// ── NOTE SESSIONE ─────────────────────────────────────────────────────────────
function toggleNote(ex){
  S.openNotes[ex]=!S.openNotes[ex];
  const eid=ex.replace(/[^a-zA-Z0-9]/g,'_');
  const wrap=document.getElementById('nw-'+eid);
  if(wrap){
    wrap.classList.toggle('open',S.openNotes[ex]);
    if(S.openNotes[ex])document.getElementById('nt-'+eid)?.focus();
  }
}
function upNote(ex,val){
  const d=S.activeDayId;
  if(!S.thisWeek[d])S.thisWeek[d]={};
  if(!S.thisWeek[d][ex])S.thisWeek[d][ex]={};
  S.thisWeek[d][ex].sessionNote=val;
  save();
  // update emoji on button without full re-render
  const eid=ex.replace(/[^a-zA-Z0-9]/g,'_');
  const btn=document.querySelector('[onclick="toggleNote(\''+ex.replace(/'/g,"\\'")+'\')"]');
  if(btn){btn.textContent=val.length>0?'📝':'📋';btn.classList.toggle('has',val.length>0)}
}

// ── AZIONI EDIT ───────────────────────────────────────────────────────────────
function addEx(){
  const inp=document.getElementById('nex'),name=inp.value.trim(),day=activeDay();
  if(!name||day.exercises.some(e=>xn(e)===name))return;
  day.exercises.push({name,note:''});inp.value='';renderEdit();
}
function rmEx(name){const day=activeDay();day.exercises=day.exercises.filter(e=>xn(e)!==name);renderEdit()}
function mvEx(i,dir){
  const day=activeDay(),j=i+dir;
  if(j<0||j>=day.exercises.length)return;
  [day.exercises[i],day.exercises[j]]=[day.exercises[j],day.exercises[i]];renderEdit();
}
function saveSchema(){lsSet(DAYS_KEY,S.days);showToast('✓ Scheda salvata');navTab('home')}

// ── AUTOSAVE ALL'USCITA ───────────────────────────────────────────────────────
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')save()});
window.addEventListener('pagehide',()=>save());
window.addEventListener('blur',()=>save());

// ── INIT ──────────────────────────────────────────────────────────────────────
loadState();navTab('home');
</script>
</body>
